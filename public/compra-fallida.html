<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pago no procesado — Javotecocina</title>
<link rel="icon" type="image/png" href="/img/favicon-jtc.png">
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Barlow',system-ui,sans-serif;background:#1a120b;color:#f5ede4;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;}

<body>
<div class="icon">❌</div>
<h1>El pago no se completó</h1>

<script>
setTimeout(()=>{ window.location.href='/?compra=fallida'; }, 3000);
</script>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pago en proceso — Javotecocina</title>
<link rel="icon" type="image/png" href="/img/favicon-jtc.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;600;700&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Barlow',system-ui,sans-serif;background:#1a120b;color:#f5ede4;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;}
.icon{font-size:4rem;margin-bottom:1.5rem;}
h1{font-size:2rem;font-weight:700;margin-bottom:.75rem;color:#e8730a;}
p{font-size:1rem;color:rgba(245,237,228,.7);line-height:1.6;max-width:420px;margin-bottom:2rem;}
.btn{display:inline-block;background:#C84B11;color:#fff;padding:.85rem 2.5rem;border-radius:3px;text-decoration:none;font-weight:700;font-size:.95rem;letter-spacing:.08em;text-transform:uppercase;transition:background .2s;}
.btn:hover{background:#e05a1a;}
</style>
</head>
<body>
<div class="icon">⏳</div>
<h1>Pago en proceso</h1>
<p>Tu pago está siendo procesado. Cuando se acredite, el recetario aparecerá automáticamente en <strong>Mi cuenta → Mis compras</strong>.</p>
<a href="/" class="btn">Volver al inicio →</a>
<script>
setTimeout(()=>{ window.location.href='/?compra=pendiente'; }, 4000);
</script>
</body>
</html>
